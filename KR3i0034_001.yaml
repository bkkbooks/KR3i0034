body:
  text: 范村菊譜宋范成大撰山林好事者或以菊比君子其說以謂嵗華婉娩草木變衰乃獨爛然秀發傲睨風露此幽人逸士之操雖寂寥荒寒中味道之腴不改其樂者也神農書以菊為養生上藥能輕身延年南陽人飲其潭水皆壽百嵗使夫人者有為於當世醫國惠民亦猶是而已菊於君子之道誠有臭味哉月令以動植志氣候如桃桐華直云始華至菊獨曰菊有黃華豈以其正色獨立不伍衆草變詞而言之歟故名勝之士未有不愛菊者至陶淵明尤甚愛之而菊名益重又其花時秋暑始退嵗事既登天氣髙明人情舒閒騷人飲流亦以菊為時花移檻列斛輦致觴詠間謂之重九節物此非深知菊者要亦不可謂不愛菊也愛者既多種者日廣吳下老圃伺春苗尺許時掇去其顛數日則歧出兩枝又掇之每掇益岐至秋則一幹所出數千百朵婆娑團植如車蓋熏籠矣人力勤土又膏沃花亦為之屢變頃見東陽人家菊圖多至七十種淳熙丙午范村所植止得三十六種悉為譜之明年將益訪求他品為後譜云菊品黃勝金黃疊金黃棣棠菊疊羅黃麝香黃太真黃垂絲菊千葉小金黃鴛鴦菊金鈴菊毬子菊單葉小金錢夏小金鈴十樣菊甘菊野菊白五月菊金杯玉盤喜容千葉御衣黃千葉萬鈴菊蓮花菊芙蓉菊茉莉菊木香菊酴醿菊艾葉菊白麝香白荔支銀杏菊波斯菊一枝只一葩倒垂如髮之鬈雜色佛頂菊桃花菊胭脂菊紫菊一名孩兒黃花勝金黃一名大金黃菊以黃為正此品最為豐縟而如輕盈花葉微尖但條梗纎弱難得團簇作大本須留意扶植乃成疊金黃一名明州黃又名小金黃花心極小疊葉穠密狀如笑壓花有富貴氣開早棣棠菊一名金鎚子花纎穠酷似棣棠色深如赤金他花色皆不及蓋竒品也窠株不甚髙金陵最多疊羅黃狀如小金黃花葉尖廋如剪羅縠三兩花自作一髙枝出叢上意度瀟灑麝香黃花心豐腴傍短葉密承之格極髙勝亦有白者大略似白佛頂丁勝之逺甚吳中比年始有千葉小金錢略似明州黃花葉中外疊疊整齊心甚大太真黃花如小金錢加鮮明單花小金錢花心尤大開最早重陽前已爛漫垂絲菊花蘂深黃莖極柔細隨風動搖如垂絲海棠鴛鴦菊花常相偶葉深碧金鈴菊一名荔枝菊舉體千葉細瓣簇成小毬如小荔枝枝條長茂可以攬結江東人喜種之有結為浮圖樓閣髙丈餘者余頃北使過欒城其地多菊家家以盆盎遮門悉為鸞鳯亭臺之狀即此一種毬子菊如金鈴而差小二種相去不遠其大小名字出於栽培肥瘠之别小金鈴一名夏菊花如金鈴而極小無大本夏中開花藤菊花密條柔以長如藤蔓可編作屏幛亦名棚菊種之坡上則垂下裊數尺如纓絡尤宜池潭之瀕十樣菊一本開花形模各異或多葉或單葉或大或小或如金鈴往往有六七色以成數通名之曰十樣衢嚴間花黃杭之屬邑有白者甘菊一名家菊人家種以供蔬茹凡菊葉皆深緑而厚味極苦或有毛惟此葉淡緑柔瑩味微甘咀嚼香味俱勝擷以作羮及泛茶極有風致天隨子所賦即此種花差勝野菊甚本不繫花野菊旅生田野及水濱花單葉極瑣細白花五月菊花心極大每一鬚皆中空攢成一匾毬子紅白單葉繞承之每枝只一花徑二寸葉似同蒿夏中開近年院體畫草蟲喜以此菊寫生金杯玉盤中心黃四傍淺白大葉三數層花頭徑三寸菊之大者不過此本出江東比年稍移栽吳下此與五月菊二品以其花徑寸特大故列之於前喜容千葉花初開微黃花心極小花中色深外微暈淡欣然丰艷有喜色甚稱其名久則變白尤耐封殖可以引長七八尺至一丈亦可攬結白花中髙品也御衣黃千葉花初開深鵝黃大略似喜容而差疏瘦久則變白萬鈴菊中心淡黃鎚子傍白花葉繞之花端極尖香尤清烈蓮花菊如小白蓮花多葉而無心花頭疏極蕭散清絶一枝只一葩緑葉亦甚纎巧芙蓉菊開就者如小木芙蓉尤穠盛者如樓子芍藥但難培植多不能繁橆茉莉菊花葉繁縟全似茉莉緑葉亦似之長大而圓淨木香菊多葉略似御衣黃初開淺鵝黃久則一白花葉尖薄盛開則微卷芳氣最烈一名腦子菊酴醿菊細葉稠疊全似酴醿比茉莉差小而黃艾葉菊心小葉單緑葉尖長似蓬艾白麝香似麝香黃花差小亦豐腴韻勝銀杏菊淡白時有微紅花葉尖緑葉全似銀杏葉白荔枝與金鈴同但花白耳波斯菊花頭極大一枝只一葩喜倒垂下久則微捲如髮之鬈雜色佛頂菊亦名佛頭菊中黃心極大四傍白花一層繞之初秋先開白色漸沁微紅桃花菊多至四五重粉紅色濃淡在桃杏紅梅之間未霜即開最為妍麗中秋後便可賞以其質如白之受采故附白花胭脂菊類桃花菊深紅淺紫比胭脂色尤重比年始有之此品既出桃花菊遂無顔色蓋竒品也姑附白花之後紫菊一名孩兒菊花如紫茸叢茁細碎微有菊香或云即澤蘭也以其與菊同時又常及重九故附於菊後序菊有黃白二種而以黃為正人於牡丹獨曰花而不名好事者於菊亦但曰黃花皆所以珍異之故余譜先黃而後白陶隱居謂菊有二種一種莖紫氣香味甘葉嫩可食花微小者為真菊青莖細葉作蒿艾氣味苦花大名苦薏非真也今吳下惟甘菊一種可食花細碎品不甚髙餘味皆苦白花尤甚花亦大隱居論藥既不以此為真後復云白菊治風眩陳藏器之說亦然靈寶方及抱朴子丹法又悉用白菊蓋與前說相抵牾今詳此惟甘菊一種可食亦入藥餌餘黃白二花雖不可餌皆入藥而治頭風則尚白者此論堅定無疑併著于後范村菊譜
